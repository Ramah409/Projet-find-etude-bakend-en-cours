# Nom de l'application
spring.application.name=projetfind-etude

# ---------- PostgreSQL ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_utilisateurs
spring.datasource.username=postgres
spring.datasource.password=postgres

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- Port HTTP ----------
server.port=8080

#----active l’affichage de petits détails dans les erreurs 500 côté API ---
app.errors.include-details=true

# Secret pour signer les JWT (exemple DEV ; mets une longue phrase)
app.jwt.secret=TOUJOURS-mettre-une-tres-tres-longue-phrase-secrete-IMPREVISIBLE-2025!!

# Durée (en minutes)
app.jwt.exp-minutes=120



